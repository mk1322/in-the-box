</head>
<body>

  <!-- HEADER -->

8.18 3.17.37 4.18.18.96.43 1.68.73 2.16.37.43.86.7 1.47.79.61.1 1.41.14 2.39.14zm23.72 10.65l14.41-24.91-14.13-24.62h20.19l6.06 14.04h.73l6.42-14.04h19.46l-14.04 24.26 14.32 25.27h-20.28l-6.33-14.62h-.92l-6.42 14.62h-19.46z"/></svg>
    </h1>
    <p class="header__subtitle">Dopasuj gabaryt w AR</p>
  </header>

  <!-- PODGLĄD 3D -->
  <section class="viewer" aria-label="Podgląd 3D pudełka">
    <model-viewer
      id="viewer"
      src="models/gabaryt-b.glb"
      ios-src="models/gabaryt-b.usdz"
      poster="assets/gabaryt-b-poster.webp"
      loading="lazy"
      reveal="auto"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="fixed"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      camera-orbit="45deg 65deg 2m"
      environment-image="neutral"
      alt="Model 3D pudełka InPost — Gabaryt B, 19 × 38 × 64 cm"
    >
      <!-- Loading skeleton -->
      <div slot="poster" class="poster-skeleton">
        <div class="poster-skeleton__shimmer"></div>
        <p class="poster-skeleton__text">Ładowanie modelu 3D…</p>
      </div>

    </model-viewer>
  </section>

  <!-- SELEKTOR GABARYTU -->
  <section class="selector" aria-label="Wybierz gabaryt">
    <div class="selector__cards" role="radiogroup" aria-label="Rozmiary gabarytów">
      <button class="card" role="radio" aria-checked="false"
              data-gabaryt="a" data-src="models/gabaryt-a.glb" data-ios="models/gabaryt-a.usdz"
              data-poster="assets/gabaryt-a-poster.webp"
              data-alt="Model 3D pudełka InPost — Gabaryt A, 8 × 38 × 64 cm"
              onclick="selectGabaryt(this)" aria-label="Gabaryt A, 8 × 38 × 64 cm, do 25 kg">
        <img class="card__icon" src="assets/icon-gabaryt-a.svg" alt="" aria-hidden="true" width="40" height="40">
        <span class="card__name">Gabaryt A</span>
        <span class="card__dims">8 × 38 × 64 cm</span>
        <span class="card__weight">do 25 kg</span>
      </button>
      <button class="card card--active" role="radio" aria-checked="true"
              data-gabaryt="b" data-src="models/gabaryt-b.glb" data-ios="models/gabaryt-b.usdz"
              data-poster="assets/gabaryt-b-poster.webp"
              data-alt="Model 3D pudełka InPost — Gabaryt B, 19 × 38 × 64 cm"
              onclick="selectGabaryt(this)" aria-label="Gabaryt B, 19 × 38 × 64 cm, do 25 kg">
        <img class="card__icon" src="assets/icon-gabaryt-b.svg" alt="" aria-hidden="true" width="40" height="40">
        <span class="card__name">Gabaryt B</span>
        <span class="card__dims">19 × 38 × 64 cm</span>
        <span class="card__weight">do 25 kg</span>
      </button>
      <button class="card" role="radio" aria-checked="false"
              data-gabaryt="c" data-src="models/gabaryt-c.glb" data-ios="models/gabaryt-c.usdz"
              data-poster="assets/gabaryt-c-poster.webp"
              data-alt="Model 3D pudełka InPost — Gabaryt C, 41 × 38 × 64 cm"
              onclick="selectGabaryt(this)" aria-label="Gabaryt C, 41 × 38 × 64 cm, do 25 kg">
        <img class="card__icon" src="assets/icon-gabaryt-c.svg" alt="" aria-hidden="true" width="40" height="40">
        <span class="card__name">Gabaryt C</span>
        <span class="card__dims">41 × 38 × 64 cm</span>
        <span class="card__weight">do 25 kg</span>
      </button>
    </div>
  </section>

  <!-- AR BUTTON -->
  <button class="cta cta--dark" id="arBtn" onclick="document.getElementById('viewer').activateAR()" aria-label="Zobacz w rozszerzonej rzeczywistości">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3,4c0-0.55,0.45-1,1-1h2V1H4C2.35,1,1,2.35,1,4v2h2V4z"/><path d="M20,3c0.55,0,1,0.45,1,1v2h2V4c0-1.65-1.35-3-3-3h-2v2H20z"/><path d="M4,21c-0.55,0-1-0.45-1-1v-2H1v2c0,1.65,1.35,3,3,3h2v-2H4z"/><path d="M20,21c0.55,0,1-0.45,1-1v-2h2v2c0,1.65-1.35,3-3,3h-2v-2H20z"/><path d="M18.25,7.6l-5.5-3.18c-0.46-0.27-1.04-0.27-1.5,0L5.75,7.6C5.29,7.87,5,8.36,5,8.9v6.35c0,0.54,0.29,1.03,0.75,1.3l5.5,3.18c0.46,0.27,1.04,0.27,1.5,0l5.5-3.18c0.46-0.27,0.75-0.76,0.75-1.3V8.9C19,8.36,18.71,7.87,18.25,7.6z M7,14.96v-4.62l4,2.32v4.61L7,14.96z M12,10.93L8,8.61l4-2.31l4,2.31L12,10.93z M13,17.27v-4.61l4-2.32v4.62L13,17.27z"/></svg>
    Zobacz w AR
  </button>

  <hr class="divider">

  <!-- CTA -->
  <a id="cta" href="https://inpoststore.com/pl-pl/produkty/gabaryt-b" target="_blank" rel="noopener" class="cta" aria-label="Kup opakowanie w InStore (otwiera nową kartę)">
    Kup opakowanie w InStore
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 6V8H5V19H16V14H18V20C18 20.2652 17.8946 20.5196 17.7071 20.7071C17.5196 20.8946 17.2652 21 17 21H4C3.73478 21 3.48043 20.8946 3.29289 20.7071C3.10536 20.5196 3 20.2652 3 20V7C3 6.73478 3.10536 6.48043 3.29289 6.29289C3.48043 6.10536 3.73478 6 4 6H10ZM21 3V12L17.206 8.207L11.207 14.207L9.793 12.793L15.792 6.793L12 3H21Z"/></svg>
  </a>

  <script>
    /* ── Gabaryt selector ── */
    function selectGabaryt(card) {
      const prev = document.querySelector('.card--active');
      if (prev) { prev.classList.remove('card--active'); prev.setAttribute('aria-checked', 'false'); }
      card.classList.add('card--active');
      card.setAttribute('aria-checked', 'true');

      const viewer = document.getElementById('viewer');

      // Fade-out → swap → fade-in
      viewer.classList.add('viewer--switching');
      setTimeout(() => {
        viewer.src = card.dataset.src;
        viewer.setAttribute('ios-src', card.dataset.ios);
        viewer.setAttribute('poster', card.dataset.poster);
        viewer.setAttribute('alt', card.dataset.alt);
        viewer.classList.remove('viewer--switching');
      }, 200);

      document.getElementById('cta').href =
        'https://inpoststore.com/pl-pl/produkty/gabaryt-' + card.dataset.gabaryt;
    }

    /* ── Service Worker ── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

</body>
</html>
