  <!-- CTA -->
  <a id="cta" href="https://inpoststore.com/pl-pl/produkty/gabaryt-b" target="_blank" rel="noopener" class="cta">

    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 6V8H5V19H16V14H18V20C18 20.2652 17.8946 20.5196 17.7071 20.7071C17.5196 20.8946 17.2652 21 17 21H4C3.73478 21 3.48043 20.8946 3.29289 20.7071C3.10536 20.5196 3 20.2652 3 20V7C3 6.73478 3.10536 6.48043 3.29289 6.29289C3.48043 6.10536 3.73478 6 4 6H10ZM21 3V12L17.206 8.207L11.207 14.207L9.793 12.793L15.792 6.793L12 3H21Z"/></svg>

  <script>
    /* ── Theme ── */
    function getPreferredTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    applyTheme(getPreferredTheme());
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
    });
    /* ── i18n ── */
    const T = {
      en: { subtitle:"Match your parcel size in AR", sizeA:"Size A", sizeB:"Size B", sizeC:"Size C", weight:"up to 25 kg", viewAR:"View in AR", buyCTA:"Buy packaging at InStore", loading:"Loading 3D model…" },
      pl: { subtitle:"Dopasuj gabaryt w AR", sizeA:"Gabaryt A", sizeB:"Gabaryt B", sizeC:"Gabaryt C", weight:"do 25 kg", viewAR:"Zobacz w AR", buyCTA:"Kup opakowanie w InStore", loading:"Ładowanie modelu 3D…" },
      it: { subtitle:"Prova la dimensione del pacco in AR", sizeA:"Taglia A", sizeB:"Taglia B", sizeC:"Taglia C", weight:"fino a 25 kg", viewAR:"Vedi in AR", buyCTA:"Acquista imballaggio su InStore", loading:"Caricamento modello 3D…" },
      fr: { subtitle:"Essayez la taille du colis en AR", sizeA:"Taille A", sizeB:"Taille B", sizeC:"Taille C", weight:"jusqu'à 25 kg", viewAR:"Voir en AR", buyCTA:"Acheter l'emballage sur InStore", loading:"Chargement du modèle 3D…" },
      es: { subtitle:"Prueba el tamaño del paquete en AR", sizeA:"Tamaño A", sizeB:"Tamaño B", sizeC:"Tamaño C", weight:"hasta 25 kg", viewAR:"Ver en AR", buyCTA:"Comprar embalaje en InStore", loading:"Cargando modelo 3D…" },
      pt: { subtitle:"Experimente o tamanho da encomenda em AR", sizeA:"Tamanho A", sizeB:"Tamanho B", sizeC:"Tamanho C", weight:"até 25 kg", viewAR:"Ver em AR", buyCTA:"Comprar embalagem na InStore", loading:"A carregar modelo 3D…" },
      nl: { subtitle:"Pas de pakketmaat in AR", sizeA:"Maat A", sizeB:"Maat B", sizeC:"Maat C", weight:"tot 25 kg", viewAR:"Bekijk in AR", buyCTA:"Koop verpakking bij InStore", loading:"3D-model laden…" },
      be: { subtitle:"Pas de pakketmaat in AR", sizeA:"Maat A", sizeB:"Maat B", sizeC:"Maat C", weight:"tot 25 kg", viewAR:"Bekijk in AR", buyCTA:"Koop verpakking bij InStore", loading:"3D-model laden…" },
    };

    function setLang(lang) {
      const t = T[lang] || T.en;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key]) el.textContent = t[key];
      });
      document.documentElement.lang = lang === 'be' ? 'nl-BE' : lang;
      document.getElementById('langCurrent').textContent = lang.toUpperCase();
      document.querySelectorAll('#langMenu li').forEach(li => {
        li.classList.toggle('lang__menu-item--active', li.dataset.lang === lang);
      });
      localStorage.setItem('lang', lang);
    }

    function toggleLang() {
      const dd = document.getElementById('langDropdown');
      const open = dd.classList.toggle('lang--open');
      dd.querySelector('.lang__toggle').setAttribute('aria-expanded', open);
    }

    function pickLang(lang) {
      setLang(lang);
      toggleLang();
    }

    // Close on outside click
    document.addEventListener('click', e => {
      const dd = document.getElementById('langDropdown');
      if (!dd.contains(e.target)) {
        dd.classList.remove('lang--open');
        dd.querySelector('.lang__toggle').setAttribute('aria-expanded', 'false');
      }
    });

    // Detect language: saved > browser > fallback en
    function detectLang() {
      const saved = localStorage.getItem('lang');
      if (saved) return saved;
      const supported = Object.keys(T);
      for (const navLang of navigator.languages || [navigator.language]) {
        const code = navLang.toLowerCase();
        if (code.startsWith('nl-be') || code === 'be') return 'be';
        const short = code.split('-')[0];
        if (supported.includes(short)) return short;
      }
      return 'en';
    }

    const initLang = detectLang();
    setLang(initLang);

    /* ── Gabaryt selector ── */
    function selectGabaryt(card) {
      const prev = document.querySelector('.card--active');
      if (prev) { prev.classList.remove('card--active'); prev.setAttribute('aria-checked', 'false'); }
      card.classList.add('card--active');
      card.setAttribute('aria-checked', 'true');

      const viewer = document.getElementById('viewer');
      viewer.classList.add('viewer--switching');
      setTimeout(() => {
        viewer.src = card.dataset.src;
        viewer.setAttribute('ios-src', card.dataset.ios);
        viewer.setAttribute('poster', card.dataset.poster);
        viewer.setAttribute('alt', card.dataset.alt);
        viewer.classList.remove('viewer--switching');
      }, 200);

      document.getElementById('cta').href =
        'https://inpoststore.com/pl-pl/produkty/gabaryt-' + card.dataset.gabaryt;
    }

    /* ── Service Worker ── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
